name: Frontend CI

on:
  pull_request:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Github Repository 불러오기
        uses: actions/checkout@v5

      - name: Node.js 설치하기
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "npm"

      - name: 의존성 설치
        run: npm ci

      - name: 포맷 검사
        run: npm run format:check

      - name: 린트 검사
        run: npm run lint

      - name: 타입 검사
        run: npm run typecheck

      - name: 테스트
        run: npm run test

      - name: 프로젝트 빌드
        run: npm run build
