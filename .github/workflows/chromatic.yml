name: Chromatic

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read
  pull-requests: write

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Chromatic
        id: chromatic_build
        uses: chromaui/action@latest
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          exitZeroOnChanges: true
          onlyChanged: true

      - name: Comment PR with Chromatic results
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: "chromatic-review"
          message: |
            ### 🎨 Storybook Preview (Chromatic)

            | 결과 | 상세 내용 |
            | :--- | :--- |
            | 🚀 **Storybook Preview** | [미리보기 바로가기](${{ steps.chromatic_build.outputs.storybookUrl }}) |
            | 🛠 **Build Details** | [Chromatic 빌드 리포트](${{ steps.chromatic_build.outputs.buildUrl }}) |
